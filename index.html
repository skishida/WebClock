<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Clock • Simple Local Clock</title>

  <!-- Google Font -->
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@700&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <main class="clock-app" role="application" aria-label="Local clock">
    <div class="clock">
      <div id="date" class="date small"></div>
      <div class="time">
        <div id="hours-minutes" class="big digits hours-minutes" aria-live="polite">
          <span id="hours" class="hours">--</span>
          <span class="colon" aria-hidden="true">:</span>
          <span id="minutes" class="minutes">--</span>
        </div>
        <span id="seconds" class="small digits seconds" aria-hidden="true"></span>
      </div>
      <div class="overlay-ui" id="overlay-ui" aria-hidden="true">
        <div id="hint" class="hint" aria-hidden="true">Press <kbd>d</kbd> to toggle dark/light, <kbd>s</kbd> to toggle seconds</div>
        <div class="control-bar" aria-label="Display controls">
          <button type="button" class="control-button" data-action="theme">Theme</button>
          <button type="button" class="control-button" data-action="seconds">Seconds</button>
          <button type="button" class="control-button" data-action="outline">Outline</button>
          <button type="button" class="control-button" data-action="fullscreen" id="fullscreen-button">Fullscreen</button>
        </div>
      </div>
    </div>
  </main>

  <script src="script.js" defer></script>
</body>
</html>
